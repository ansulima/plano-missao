<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plano de Missão — Ramo Canindé</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --verde:   #3D6B4F;
      --dourado: #B8973A;
      --bege:    #F5F0E8;
      --escuro:  #1A2A1E;
    }

    html, body {
      min-height: 100%;
      background: var(--escuro);
      font-family: 'Cormorant Garamond', serif;
      color: var(--bege);
      overflow-x: hidden;
    }

    /* ── fundo com textura sutil ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(61,107,79,.35) 0%, transparent 70%),
        radial-gradient(ellipse 60% 80% at 80% 100%, rgba(184,151,58,.15) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px 56px;
      gap: 0;
    }

    /* ── linha decorativa superior ── */
    .ornament {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 36px;
      opacity: 0;
      animation: fadeUp .8s ease forwards .1s;
    }
    .ornament-line {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--dourado));
    }
    .ornament-line.right {
      background: linear-gradient(90deg, var(--dourado), transparent);
    }
    .ornament-diamond {
      width: 8px; height: 8px;
      background: var(--dourado);
      transform: rotate(45deg);
    }

    /* ── título principal ── */
    .titulo {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.5rem, 5vw, 2.6rem);
      font-weight: 600;
      line-height: 1.2;
      text-align: center;
      color: #fff;
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeUp .9s ease forwards .35s;
      text-shadow: 0 2px 24px rgba(0,0,0,.5);
    }
    .titulo em {
      font-style: italic;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      color: var(--dourado);
      font-size: 1.1em;
    }

    /* ── moldura da imagem ── */
    .frame {
      position: relative;
      width: min(420px, 88vw);
      opacity: 0;
      animation: fadeUp 1s ease forwards .55s;
    }

    /* cantos decorativos */
    .frame::before, .frame::after,
    .frame .corner-bl, .frame .corner-br {
      content: '';
      position: absolute;
      width: 28px; height: 28px;
      border-color: var(--dourado);
      border-style: solid;
      z-index: 2;
    }
    .frame::before  { top: -6px;    left: -6px;   border-width: 2px 0 0 2px; }
    .frame::after   { top: -6px;    right: -6px;  border-width: 2px 2px 0 0; }
    .frame .corner-bl { bottom: -6px; left: -6px;  border-width: 0 0 2px 2px; }
    .frame .corner-br { bottom: -6px; right: -6px; border-width: 0 2px 2px 0; }

    .frame img {
      width: 100%;
      display: block;
      border-radius: 2px;
      filter: sepia(.12) contrast(1.04) brightness(.96);
      box-shadow:
        0 8px 40px rgba(0,0,0,.6),
        0 0 0 1px rgba(184,151,58,.25);
    }

    /* gradiente inferior na imagem */
    .frame .vignette {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        transparent 55%,
        rgba(26,42,30,.75) 100%
      );
      border-radius: 2px;
      pointer-events: none;
    }

    /* ── versículo sobre a imagem ── */
    .versiculo {
      position: absolute;
      bottom: 20px;
      left: 0; right: 0;
      text-align: center;
      font-style: italic;
      font-size: .88rem;
      color: rgba(245,240,232,.8);
      padding: 0 16px;
      line-height: 1.5;
      pointer-events: none;
    }

    /* ── separador ── */
    .sep {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 36px 0 28px;
      width: min(320px, 80vw);
      opacity: 0;
      animation: fadeUp .8s ease forwards .8s;
    }
    .sep-line { flex: 1; height: 1px; background: rgba(184,151,58,.4); }
    .sep-icon { color: var(--dourado); font-size: 1rem; }

    /* ── botão / link ── */
    .btn-wrap {
      opacity: 0;
      animation: fadeUp .8s ease forwards .95s;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 14px 36px;
      border: 1px solid rgba(184,151,58,.6);
      background: rgba(184,151,58,.08);
      color: var(--bege);
      font-family: 'Cinzel', serif;
      font-size: .82rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 2px;
      transition: background .3s, border-color .3s, transform .2s;
      cursor: pointer;
    }
    .btn:hover {
      background: rgba(184,151,58,.2);
      border-color: var(--dourado);
      transform: translateY(-2px);
    }
    .btn svg { width: 16px; height: 16px; fill: var(--dourado); flex-shrink: 0; }

    /* ── rodapé ── */
    .footer {
      margin-top: 52px;
      font-size: .72rem;
      letter-spacing: .12em;
      color: rgba(245,240,232,.3);
      text-align: center;
      opacity: 0;
      animation: fadeUp .8s ease forwards 1.1s;
    }

    /* ── animação base ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── botão de som ── */
    .som-btn {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 10;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid rgba(184,151,58,.5);
      background: rgba(26,42,30,.6);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      color: var(--dourado);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .25s, border-color .25s, transform .2s;
      opacity: 0;
      animation: fadeUp .6s ease forwards 1.3s;
    }
    .som-btn:hover {
      background: rgba(184,151,58,.18);
      border-color: var(--dourado);
      transform: scale(1.05);
    }
    .som-btn svg { width: 18px; height: 18px; fill: currentColor; }
    .som-btn .icon-off { display: none; }
    .som-btn.muted .icon-on { display: none; }
    .som-btn.muted .icon-off { display: block; }

    /* ── tablet (até 900px) ── */
    @media (max-width: 900px) {
      .frame { width: min(440px, 80vw); }
    }

    /* ── smartphone (até 600px) ── */
    @media (max-width: 600px) {
      .page { padding: 32px 18px 40px; }
      .ornament { margin-bottom: 24px; }
      .ornament-line { width: 44px; }
      .titulo { margin-bottom: 28px; }
      .frame { width: min(360px, 92vw); }
      .versiculo { font-size: .8rem; bottom: 14px; padding: 0 12px; }
      .sep { margin: 26px 0 22px; }
      .btn { padding: 12px 26px; font-size: .74rem; letter-spacing: .14em; }
      .footer { margin-top: 36px; font-size: .66rem; padding: 0 12px; }
    }

    /* ── smartphone bem pequeno (até 380px) ── */
    @media (max-width: 380px) {
      .frame { width: 94vw; }
      .versiculo { font-size: .74rem; }
      .btn { padding: 11px 22px; font-size: .7rem; }
    }

    /* ── smartphone em paisagem (telas baixas) ── */
    @media (orientation: landscape) and (max-height: 520px) {
      .page { justify-content: flex-start; padding: 24px 18px 32px; }
      .ornament { margin-bottom: 16px; }
      .titulo { margin-bottom: 20px; }
      .frame { width: min(320px, 50vw); }
      .sep { margin: 20px 0 16px; }
      .footer { margin-top: 24px; }
    }
  </style>
</head>
<body>
  <audio id="bgMusic" src="https://assets.churchofjesuschrist.org/33/25/3325ec150356cc5f8aab551ff65c6498ad0611b1/let_us_all_press_on.mp3" loop preload="auto"></audio>

  <button id="somBtn" class="som-btn muted" type="button" aria-label="Ativar som">
    <svg class="icon-on" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M3 10v4h4l5 4V6L7 10H3zm13.5 2a4.5 4.5 0 0 0-2.5-4.03v8.06A4.5 4.5 0 0 0 16.5 12zM14 3.23v2.06a7 7 0 0 1 0 13.42v2.06A9 9 0 0 0 14 3.23z"/>
    </svg>
    <svg class="icon-off" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M16.5 12A4.5 4.5 0 0 0 14 7.97v2.21l2.45 2.45c.03-.21.05-.42.05-.63zM19 12c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.96 8.96 0 0 0 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 0 0 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
    </svg>
  </button>

  <div class="page">

    <div class="ornament">
      <div class="ornament-line"></div>
      <div class="ornament-diamond"></div>
      <div class="ornament-line right"></div>
    </div>

    <h1 class="titulo">
      Bem-vindos ao<br>
      <em>Plano de Missão</em><br>
      Ramo Canindé
    </h1>

    <div class="frame">
      <img src="jesus.jpg" alt="Jesus Cristo à beira do lago" />
      <div class="vignette"></div>
      <div class="corner-bl"></div>
      <div class="corner-br"></div>
      <p class="versiculo">"...ide e fazei discípulos de todas as nações..." — Mateus 28:19</p>
    </div>

    <div class="sep">
      <div class="sep-line"></div>
      <span class="sep-icon">✦</span>
      <div class="sep-line"></div>
    </div>

    <div class="btn-wrap">
      <a class="btn" href="https://drive.google.com/file/d/17VuU9RLt1XHjYOCmnoOUSt25XV2hToNd/view?usp=sharing" target="_blank">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM6 20V4h5v7h7v9H6z"/>
        </svg>
        Acessar plano
      </a>
    </div>

    <p class="footer">A Igreja de Jesus Cristo dos Santos dos Últimos Dias</p>

  </div>

  <script>
    (function () {
      const audio = document.getElementById('bgMusic');
      const btn = document.getElementById('somBtn');
      audio.volume = 0.5;

      function play() {
        audio.play().then(() => {
          btn.classList.remove('muted');
          btn.setAttribute('aria-label', 'Silenciar');
        }).catch(() => {
          // navegador bloqueou — aguarda primeira interação
        });
      }

      function pause() {
        audio.pause();
        btn.classList.add('muted');
        btn.setAttribute('aria-label', 'Ativar som');
      }

      // tenta tocar imediatamente
      play();

      // se foi bloqueado, dispara no primeiro toque/clique em qualquer lugar
      function firstInteraction() {
        if (audio.paused) play();
        document.removeEventListener('click', firstInteraction);
        document.removeEventListener('touchstart', firstInteraction);
        document.removeEventListener('keydown', firstInteraction);
      }
      document.addEventListener('click', firstInteraction);
      document.addEventListener('touchstart', firstInteraction);
      document.addEventListener('keydown', firstInteraction);

      // botão liga/desliga
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (audio.paused) play();
        else pause();
      });
    })();
  </script>
</body>
</html>
